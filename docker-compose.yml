# Dev only. Source is bind-mounted; node_modules live in named volumes so the
# Linux-built node-pty is never shadowed by host (macOS) modules.
services:
  backend:
    build:
      context: .
      target: dev
    command: npm run dev --workspace backend
    # Reaps the zombies chromium leaves behind (session browser panes).
    init: true
    environment:
      # Same as prod: agent logins/configs land on the data volume and persist.
      HOME: /data/home
      # Sessions inherit this from the backend process: docker commands run
      # against the dind service. Ports published there are reachable from
      # sessions (and the browser pane) at dind:<port>.
      DOCKER_HOST: tcp://dind:2375
    depends_on:
      - dind
    env_file:
      - path: .env
        required: false
    ports:
      # Host ports overridable when 8080/5173 are taken by something else.
      - "${VK_BACKEND_PORT:-8080}:8080"
    volumes:
      - .:/app
      - node_modules_root:/app/node_modules
      - node_modules_backend:/app/backend/node_modules
      - node_modules_frontend:/app/frontend/node_modules
      - data:/data

  frontend:
    build:
      context: .
      target: dev
    command: npm run dev --workspace frontend
    ports:
      - "${VK_FRONTEND_PORT:-5173}:5173"
    volumes:
      - .:/app
      - node_modules_root:/app/node_modules
      - node_modules_backend:/app/backend/node_modules
      - node_modules_frontend:/app/frontend/node_modules
    depends_on:
      - backend

  # Docker daemon for the sessions (agents building/running containers).
  # Privileged is inherent to dind; in prod this becomes a pod sidecar.
  dind:
    image: docker:28-dind
    privileged: true
    environment:
      # Plain tcp on 2375, pod/compose-network only — no TLS cert dance.
      DOCKER_TLS_CERTDIR: ""
    volumes:
      - dind_data:/var/lib/docker

volumes:
  node_modules_root:
  node_modules_backend:
  node_modules_frontend:
  data:
  dind_data:
